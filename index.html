<body>

  <div class="container">

<label>カードを選択</label>
<select id="cardSelect" onchange="applyCardPreset()">

<label>利用スタイル</label>
<select id="valueStyle" onchange="applyValueStyle()">

　　　<label>実質還元率（円換算・%）</label>

  <script>
const cardPresets = {
  manual: {
    annualFee: '',
    rate: '',
    benefit: '',
    note: '手入力モードです。ご自身のカード条件を入力してください。',
    source: 'カードを選択しない場合は、年会費・実質還元率・特典価値をご自身で入力してください。'
  },
  'hilton-basic': {
    annualFee: 16500,
    rate: '',
    benefit: 30000,
    note: 'ヒルトン一般カードの簡易目安です。',
    source: 'ヒルトン・オナーズ アメリカン・エキスプレス・カードは、公式上、通常利用で100円＝2ヒルトン・オナーズ・ボーナスポイント、一部加盟店では100円＝1ポイントとして加算されます。実質還元率は1ポイントを何円で見るかにより変わるため、円換算で手入力してください。'
  },
  'hilton-premium': {
    annualFee: 66000,
    rate: '',
    benefit: 60000,
    note: 'ヒルトンプレミアムカードの簡易目安です。',
    source: 'ヒルトン・オナーズ アメリカン・エキスプレス・プレミアム・カードは、公式上、通常利用で100円＝3ヒルトン・オナーズ・ボーナスポイント、一部加盟店では100円＝1.5ポイントとして加算されます。実質還元率は1ポイントを何円で見るかにより変わるため、円換算で手入力してください。'
  },
  'marriott-basic': {
    annualFee: 34100,
    rate: '',
    benefit: 30000,
    note: 'Marriott Bonvoy アメックス一般カードの簡易目安です。',
    source: 'Marriott Bonvoy アメリカン・エキスプレス・カードは、公式上、通常利用で100円＝2 Marriott Bonvoyポイント、Marriott Bonvoy参加ホテルでは100円＝5ポイント、対象航空会社・外貨払いでは100円＝3ポイントです。実質還元率は1ポイントを何円で見るかにより変わるため、円換算で手入力してください。'
  },
  'marriott-premium': {
    annualFee: 82500,
    rate: '',
    benefit: 60000,
    note: 'Marriott Bonvoy アメックス・プレミアムの簡易目安です。',
    source: 'Marriott Bonvoy アメリカン・エキスプレス・プレミアム・カードは、公式上、通常利用で100円＝3 Marriott Bonvoyポイント、Marriott Bonvoy参加ホテルでは100円＝6ポイントです。実質還元率は1ポイントを何円で見るかにより変わるため、円換算で手入力してください。'
  },
  'ana-wide-gold': {
    annualFee: '15400',
    rate: '',
    benefit: '',
    note: 'ANA系カードはブランド・移行コース・年会費で条件が変わるため、いったん手入力してください。',
    source: 'ANAゴールドカードは、ANA公式上、クレジットカード会社のポイントをマイルへ移行した場合、100円の支払いにつき1マイル相当が目安です。ただし、発行会社・移行コース・ANAカードマイルプラス対象利用などで条件が変わるため、実質還元率は手入力してください。'
  }
};

function applyCardPreset() {
  const selected = document.getElementById('cardSelect').value;
  const preset = cardPresets[selected];

  document.getElementById('annualFee').value = preset.annualFee;
  document.getElementById('rate').value = preset.rate;
  document.getElementById('benefit').value = preset.benefit;

  originalBenefitValue = Number(preset.benefit) || 0;

  document.getElementById('cardNote').innerText = preset.note;
  document.getElementById('sourceBox').innerText = preset.source;

  applyValueStyle();

  const cardImage = document.getElementById('cardImage');

  const imageMap = {
    'hilton-basic': 'images/hilton-basic.png',
    'hilton-premium': 'images/hilton-premium.png',
    'marriott-basic': 'images/marriott-basic.png',
    'marriott-premium': 'images/marriott-premium.png',
    'ana-wide-gold': 'images/ana-gold.png'
  };

  if (imageMap[selected]) {
    cardImage.src = imageMap[selected];
    cardImage.style.display = 'block';
  } else {
    cardImage.src = '';
    cardImage.style.display = 'none';
  }
}
function applyValueStyle() {
  const style = document.getElementById('valueStyle').value;
  const benefitInput = document.getElementById('benefit');
  const styleNote = document.getElementById('styleNote');

  if (originalBenefitValue === null) {
    originalBenefitValue = Number(benefitInput.value) || 0;
  }

  const baseBenefit = originalBenefitValue;

  let multiplier = 1;
  let note = '標準：一般的な目安で計算します。';

  if (style === 'conservative') {
    multiplier = 0.6;
    note = '保守派：特典価値を低めに見積もります。';
  } else if (style === 'hotel') {
    multiplier = 1.4;
    note = 'ホテル好き：朝食・ラウンジ・無料宿泊の価値を高めに見積もります。';
  } else if (style === 'mile') {
    multiplier = 1.2;
    note = 'マイル重視：マイルやポイント移行価値を少し高めに見積もります。';
  }

  benefitInput.value = Math.round(baseBenefit * multiplier);
  styleNote.innerText = note;
}
    function calculate() {
      const annualFee = Number(document.getElementById('annualFee').value);
      const usage = Number(document.getElementById('usage').value);
      const rate = Number(document.getElementById('rate').value);
      const benefit = Number(document.getElementById('benefit').value);

      if (!annualFee || annualFee <= 0) {
        alert('カード年会費を入力してください。');
        return;
      }

      const pointValue = usage * (rate / 100);
      const totalReturn = pointValue + benefit;
      const profit = totalReturn - annualFee;
      const recoveryRate = (totalReturn / annualFee) * 100;

      const result = document.getElementById('result');
      const judge = document.getElementById('judge');
      const profitAmount = document.getElementById('profitAmount');
      const recoveryRateBox = document.getElementById('recoveryRate');
      const comment = document.getElementById('comment');
      const detail = document.getElementById('detail');

      result.style.display = 'block';

      let message = '';
      let className = '';
      let commentText = '';

      if (profit >= 20000) {
        message = 'かなり元が取れています！';
        className = 'good-text';
        commentText = '年会費をしっかり回収できている可能性が高いです。ポイント還元だけでなく、ホテル特典やラウンジなどを活用できている人向けの結果です。';
      } else if (profit >= 0) {
        message = 'しっかり年会費回収できています';
        className = 'normal-text';
        commentText = '年会費分はおおむね回収できています。ただし、特典を使わない年があると損益が下がるため、毎年の利用状況を確認するのがおすすめです。';
      } else {
        message = '現状では年会費負けの可能性があります';
        className = 'bad-text';
        commentText = '現時点の入力条件では、年会費を回収しきれていない可能性があります。利用額、特典利用、またはカードの見直しを検討してもよいかもしれません。';
      }

      judge.className = 'result-title ' + className;
      judge.innerText = message;

      const profitSign = profit >= 0 ? '+' : '';
　　　　　profitAmount.innerHTML =
  `<span style="font-size:28px;font-weight:bold;">
    ${profitSign}¥${Math.round(profit).toLocaleString()}
  </span>`;
recoveryRateBox.innerHTML =
  `<span style="font-size:32px;font-weight:bold;">
    ${Math.round(recoveryRate)}%
  </span><br>
  回収率`;
      comment.innerText = commentText;

   let reasonText = '';
         let recommendText = '';

if (style === 'hotel') {
  recommendText =
    'ホテル利用が多い人には、ホテル特典付きカードとの相性が良い傾向です。';
}

if (style === 'mile') {
  recommendText =
    'マイル重視の場合は、ANA・JAL系カードとの比較もおすすめです。';
}

if (style === 'conservative') {
  recommendText =
    '年会費を抑えたい場合は、一般カードとの比較もおすすめです。';
}

if (profit > 0) {
  reasonText =
    `年間価値が年会費を約${Math.round(profit).toLocaleString()}円上回っています。`;
} else {
  reasonText =
    `年間価値が年会費を約${Math.abs(Math.round(profit)).toLocaleString()}円下回っています。`;
}

if (benefit >= annualFee * 0.5) {
  reasonText += '<br><br>特典価値の影響が大きい結果です。';
}

if (rate >= 1.5) {
  reasonText += '<br>実質還元率を高めに設定しています。';
}

detail.innerHTML =
  `<div style="
    margin-top:20px;
    padding:16px;
    background:#f8fafc;
    border-radius:12px;
    line-height:1.8;
    font-size:14px;
    color:#344054;
  ">
    <strong>判定根拠</strong><br><br>
    ${reasonText}<br><br>

    <strong>おすすめ傾向</strong><br><br>
    ${recommendText}
  </div>

  <div style="
    margin-top:14px;
    padding:16px;
    background:#ffffff;
    border-radius:12px;
    line-height:1.8;
    font-size:14px;
    color:#344054;
    border:1px solid #e4e7ec;
  ">
    <strong>内訳</strong><br><br>

    ポイント還元額：約
    <strong>${Math.round(pointValue).toLocaleString()}円</strong><br>

    特典価値：約
    <strong>${Math.round(benefit).toLocaleString()}円</strong><br>

    合計価値：約
    <strong>${Math.round(totalReturn).toLocaleString()}円</strong><br>

    カード年会費：約
    <strong>${Math.round(annualFee).toLocaleString()}円</strong><br>

    年会費との差額：約
    <strong>${Math.round(profit).toLocaleString()}円</strong>
  </div>

  <div style="
    margin-top:18px;
    text-align:center;
  ">
    <a href="https://www.youtube.com/@iwassan50s"
       target="_blank"
       rel="noopener noreferrer"
       style="
         display:inline-block;
         padding:14px 18px;
         background:#cc0000;
         color:#ffffff;
         text-decoration:none;
         border-radius:12px;
         font-weight:bold;
         font-size:15px;
       ">
      ▼ いわっさんの解説動画を見る
    </a>
  </div>`;

      result.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
